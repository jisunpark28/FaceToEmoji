<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FaceToEmoji</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <h1>FaceToEmoji</h1>
        <p>Turn every face in your photo into emoji magic, instantly.</p>
      </header>

      <main class="layout">
        <section class="card controls">
          <h2>Upload Photo</h2>
          <label id="dropzone" class="dropzone" for="imageInput">
            <input id="imageInput" type="file" accept="image/*" />
            <span>Drag & drop an image here, or tap to choose a file</span>
          </label>

          <p id="statusText" class="status">Loading AI models...</p>

          <div class="button-row">
            <button id="detectBtn" type="button">Auto Detect Faces</button>
            <button id="manualBtn" type="button">Add Face Manually</button>
            <button id="clearBtn" type="button">Reset Faces</button>
          </div>

          <div class="field-group">
            <label for="defaultModeSelect">Default Face Style</label>
            <select id="defaultModeSelect">
              <option value="emoji">Emoji</option>
              <option value="blur">Blur</option>
            </select>
            <button id="applyDefaultBtn" type="button">Apply to All Faces</button>
          </div>

          <div class="selected-panel">
            <h3>Selected Face</h3>
            <p id="selectedFaceMeta" class="muted">Select a face to edit details</p>
            <div class="field-group">
              <label for="selectedModeSelect">Face Style</label>
              <select id="selectedModeSelect">
                <option value="emoji">Emoji</option>
                <option value="blur">Blur</option>
              </select>
            </div>
            <label class="checkbox-row">
              <input id="excludeCheckbox" type="checkbox" />
              Exclude this face (leave unchanged)
            </label>
            <button id="removeFaceBtn" type="button" class="danger">Delete Selected Face</button>
          </div>

          <button id="downloadBtn" type="button" class="primary">Download Edited Image</button>
        </section>

        <section class="card editor">
          <h2>Live Preview</h2>
          <p class="muted">In normal mode, tap/click a face to exclude or restore it.</p>
          <div id="canvasContainer" class="canvas-container">
            <div id="canvasStage" class="canvas-stage">
              <canvas id="previewCanvas"></canvas>
              <canvas id="overlayCanvas"></canvas>
            </div>
          </div>
        </section>

        <section class="card faces">
          <h2>Detected Faces</h2>
          <ul id="faceList" class="face-list">
            <li class="empty">No faces detected yet.</li>
          </ul>
        </section>
      </main>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="./app.js"></script>
  </body>
</html>
